name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read
    secrets: inherit

  precommit:
    uses: ./.github/workflows/precommit.yml
    permissions:
      contents: read
    secrets: inherit

  codespell:
    uses: ./.github/workflows/codespell.yml
    permissions:
      contents: read
    secrets: inherit

  go_mod_tidy_check:
    uses: ./.github/workflows/go-mod-tidy-check.yml
    permissions:
      contents: read
    secrets: inherit

  markdownlint:
    uses: ./.github/workflows/markdownlint.yml
    permissions:
      contents: read
    secrets: inherit

  install_script_test:
    uses: ./.github/workflows/install-script-test.yml
    permissions:
      contents: read
    secrets: inherit

  license_check:
    uses: ./.github/workflows/license-check.yml
    permissions:
      contents: read
    secrets: inherit

  fuzz:
    uses: ./.github/workflows/fuzz.yml
    permissions:
      contents: read
    secrets: inherit

  # Fast feedback: only gate on lint/precommit/go_mod_tidy. Other checks (codespell,
  # markdownlint, license_check, install_script_test) run in parallel and are enforced
  # by branch protection rules, not by job dependencies.
  base_tests:
    needs: [lint, precommit, go_mod_tidy_check]
    uses: ./.github/workflows/base-test.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit

  build:
    needs: [lint, precommit, go_mod_tidy_check]
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    secrets: inherit

  build_no_proxy:
    # Only run no_proxy builds on main branch to save CI time
    if: github.ref == 'refs/heads/main'
    needs: [lint, precommit, go_mod_tidy_check]
    uses: ./.github/workflows/build-no-proxy.yml
    permissions:
      contents: read
    secrets: inherit

  coverage_compare:
    if: github.ref == 'refs/heads/main'
    needs: [base_tests]
    uses: ./.github/workflows/coverage-compare-main.yml
    permissions:
      contents: read
      actions: read
    secrets: inherit

  integration_tests:
    needs: [base_tests, build]
    uses: ./.github/workflows/integration-test.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit

  oidc_integration_tests:
    needs: [base_tests, build]
    uses: ./.github/workflows/oidc-integration-test.yml
    permissions:
      id-token: write
      contents: read
      checks: write
    secrets: inherit


