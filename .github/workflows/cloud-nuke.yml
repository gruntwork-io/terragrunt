name: Hourly Cloud Nuke
on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch:

jobs:
  run_cloud_nuke:
    permissions:
      id-token: write
      contents: read
    name: Nuke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install cloud-nuke
        run: |
          wget -O /usr/local/bin/cloud-nuke \
              --header="Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://github.com/gruntwork-io/cloud-nuke/releases/download/v${VERSION}/cloud-nuke_linux_amd64"

          chmod +x /usr/local/bin/cloud-nuke
        env:
          # Authenticate to reduce the likelihood of hitting rate limit issues.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: 0.49.0

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.CLOUD_NUKE_ROLE }}
          aws-region: us-east-1

      - name: Run cloud-nuke
        run: |
          cloud-nuke aws \
              --force \
              --log-level debug \
              --resource-type s3 \
              --resource-type vpc \
              --resource-type ec2 \
              --resource-type dynamodb \
              --region us-east-1 \
              --region us-west-2 \
              --region global \
              --older-than 1h \
              --config .github/cloud-nuke/config.yml

      # cloud-nuke's S3 client only reaches buckets in one region; second pass covers us-west-2
      - name: Run cloud-nuke (S3 in us-west-2)
        run: |
          cloud-nuke aws \
              --force \
              --log-level debug \
              --resource-type s3 \
              --region global \
              --older-than 1h \
              --config .github/cloud-nuke/config.yml
        env:
          CLOUD_NUKE_AWS_GLOBAL_REGION: us-west-2
