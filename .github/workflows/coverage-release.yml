name: Coverage Check (Release)

on:
  release:
    # Match announce-release.yml — skip pre-releases
    types: [released]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The tag name of the release'
        required: true

jobs:
  check-coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    env:
      MISE_PROFILE: cicd
      GOGC: "400"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}
          fetch-depth: 1

      - name: Use mise to install dependencies
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.1.9
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: go-cache-paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Go Build Cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      - name: Go Mod Cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-mod }}
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-mod-

      - name: Run Tests with Coverage
        run: |
          set -o pipefail
          if ! go test -coverprofile=coverage.out -covermode=atomic ./... -timeout 45m; then
            echo "::warning::Some tests failed — coverage data may be incomplete"
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Coverage Summary
        run: ./.github/scripts/coverage/generate-summary.sh

      - name: Get Previous Release Coverage
        id: prev-coverage
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          mkdir -p previous
          PREV_TAG=$(gh release list --exclude-drafts --exclude-pre-releases -L 50 --json tagName \
            | jq -r --arg tag "${TAG_NAME}" '[.[].tagName] as $tags | ($tags | index($tag)) as $i | if $i == null or ($i + 1) >= ($tags | length) then empty else $tags[$i + 1] end')
          if [[ -n "$PREV_TAG" ]]; then
            echo "Previous release: $PREV_TAG"
            if gh release download "$PREV_TAG" -p "coverage-summary.json" -D previous/ 2>/dev/null; then
              echo "has_previous=true" >> "$GITHUB_OUTPUT"
            else
              echo "No coverage data in previous release $PREV_TAG"
              echo "has_previous=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No previous release found"
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare Coverage
        id: compare
        run: |
          PREV_FILE="previous/coverage-summary.json"
          if [[ "${{ steps.prev-coverage.outputs.has_previous }}" != "true" ]]; then
            PREV_FILE="nonexistent"
          fi
          ./.github/scripts/coverage/compare-coverage.sh coverage-summary.json "$PREV_FILE" comparison-report.json

      - name: Write Summary
        if: always()
        run: |
          if [[ -f comparison-report.json ]]; then
            BASELINE=$(jq -r '.baseline' comparison-report.json)
            if [[ "$BASELINE" == "true" ]]; then
              echo "## Coverage Baseline Established" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Total: $(jq -r '.current_total' comparison-report.json)%" >> "$GITHUB_STEP_SUMMARY"
            else
              CURR=$(jq -r '.current_total' comparison-report.json)
              PREV=$(jq -r '.previous_total' comparison-report.json)
              DELTA=$(jq -r '.total_delta' comparison-report.json)
              echo "## :bar_chart: Coverage Report" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Current | ${CURR}% |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Previous | ${PREV}% |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Delta | ${DELTA}% |" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"

              DROPS=$(jq -r '.top_drops[:5][] | "| \(.package) | \(.previous)% | \(.current)% | \(.delta)% |"' comparison-report.json 2>/dev/null || true)
              if [[ -n "$DROPS" ]]; then
                echo "### Top Drops" >> "$GITHUB_STEP_SUMMARY"
                echo "| Package | Previous | Current | Delta |" >> "$GITHUB_STEP_SUMMARY"
                echo "|---------|----------|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
                echo "$DROPS" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

      - name: Notify Slack
        if: always() && hashFiles('comparison-report.json') != ''
        env:
          COVERAGE_SLACK_WEBHOOK_URL: ${{ secrets.COVERAGE_SLACK_WEBHOOK_URL }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
          REPO: ${{ github.repository }}
        run: ./.github/scripts/coverage/notify-slack.sh comparison-report.json

      - name: Upload comparison-report.json
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: comparison-report.json
          path: comparison-report.json
          retention-days: 30

      - name: Upload comparison-report.html
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: comparison-report.html
          path: comparison-report.html
          retention-days: 30

      - name: Upload Coverage as Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          FILES=""
          for f in coverage-summary.json coverage-summary.html comparison-report.json comparison-report.html; do
            [[ -f "$f" ]] && FILES="$FILES $f"
          done
          [[ -n "$FILES" ]] && gh release upload "$TAG_NAME" $FILES --clobber
