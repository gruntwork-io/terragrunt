name: Weekly Coverage Report

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      window_days:
        description: 'Compare HEAD against the commit from this many days ago'
        required: false
        default: '7'
      packages:
        description: 'Go packages to test (default: ./...). Scope (e.g. ./internal/strict/...) for a fast end-to-end check.'
        required: false
        default: ''
  # TEMPORARY: run the report end to end from this branch before it lands on the
  # default branch (workflow_dispatch only works once the file is on main). Remove
  # this push trigger after the feature merges.
  push:
    branches:
      - OSS-2283-long-tests-reporting

concurrency:
  group: coverage-weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  weekly:
    name: Weekly Coverage Diff
    runs-on: ubuntu-latest
    env:
      MISE_PROFILE: cicd
      GOGC: "400"
      WINDOW_DAYS: ${{ inputs.window_days || '7' }}
      WEEKLY_PKGS: ${{ inputs.packages || vars.WEEKLY_PKGS || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # The commit that triggered the run: branch HEAD on push/dispatch, main on schedule.
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Use mise to install dependencies
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.5.12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commits
        id: refs
        run: |
          set -euo pipefail
          CURRENT_SHA="$(git rev-parse HEAD)"
          # Baseline walks back the trunk (origin/main). Fetch it in case this run was
          # triggered from a branch where origin/main is not present locally.
          git fetch --no-tags --prune origin main || true
          BASE_REF="origin/main"
          git rev-parse --verify "$BASE_REF" >/dev/null 2>&1 || BASE_REF="HEAD"
          echo "Baseline ref: ${BASE_REF}"
          PREVIOUS_SHA=""
          MAX_DAYS=$((WINDOW_DAYS * 2))
          for d in $(seq "$WINDOW_DAYS" "$MAX_DAYS"); do
            candidate="$(git rev-list -1 --before="${d} days ago" "$BASE_REF" || true)"
            if [[ -n "$candidate" && "$candidate" != "$CURRENT_SHA" ]]; then
              PREVIOUS_SHA="$candidate"
              echo "Selected previous SHA at ${d} days ago: ${PREVIOUS_SHA}"
              break
            fi
          done
          if [[ -z "$PREVIOUS_SHA" ]]; then
            echo "No commit older than ${WINDOW_DAYS} days within ${MAX_DAYS}-day walkback; reporting current only."
            echo "same_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "same_commit=false" >> "$GITHUB_OUTPUT"
          fi
          CURRENT_DATE="$(git show -s --format=%cs "$CURRENT_SHA" 2>/dev/null || echo unknown)"
          PREVIOUS_DATE=""
          [[ -n "$PREVIOUS_SHA" ]] && PREVIOUS_DATE="$(git show -s --format=%cs "$PREVIOUS_SHA" 2>/dev/null || echo unknown)"
          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "previous_sha=${PREVIOUS_SHA}" >> "$GITHUB_OUTPUT"
          echo "current_date=${CURRENT_DATE}" >> "$GITHUB_OUTPUT"
          echo "previous_date=${PREVIOUS_DATE}" >> "$GITHUB_OUTPUT"
          echo "Current:  ${CURRENT_DATE} ${CURRENT_SHA}"
          echo "Previous: ${PREVIOUS_DATE:-<none>} ${PREVIOUS_SHA:-<none>}"

      - id: go-cache-paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"

      - name: Go Build Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-weekly-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-weekly-
            ${{ runner.os }}-go-build-

      - name: Go Mod Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-mod }}
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Run tests on current HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086  # WEEKLY_PKGS is an intentional space-separated package list
          ./.github/scripts/coverage/coverage-report.sh run current $WEEKLY_PKGS || true
          GITHUB_SHA="${{ steps.refs.outputs.current_sha }}" GITHUB_REF="refs/heads/main" \
            ./.github/scripts/coverage/coverage-report.sh summary current/coverage.out current/coverage-summary.json
          GITHUB_SHA="${{ steps.refs.outputs.current_sha }}" GITHUB_REF="refs/heads/main" \
            ./.github/scripts/coverage/coverage-report.sh timing current/test-events.ndjson current/timing-summary.json

      - name: Prepare previous checkout
        if: steps.refs.outputs.same_commit != 'true'
        env:
          PREV_SHA: ${{ steps.refs.outputs.previous_sha }}
        run: |
          set -euo pipefail
          git worktree add --detach "../prev" "$PREV_SHA"

      - name: Run tests on previous commit
        if: steps.refs.outputs.same_commit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREV_SHA: ${{ steps.refs.outputs.previous_sha }}
        working-directory: ../prev
        run: |
          set -euo pipefail
          # Prefer the current checkout's coverage script so weekly tooling is consistent
          # even if the previous commit predates it.
          REPORT="$GITHUB_WORKSPACE/.github/scripts/coverage/coverage-report.sh"
          # shellcheck disable=SC2086  # WEEKLY_PKGS is an intentional space-separated package list
          "$REPORT" run previous $WEEKLY_PKGS || true
          mkdir -p "$GITHUB_WORKSPACE/previous"
          if [[ -s previous/coverage.out ]]; then
            GITHUB_SHA="$PREV_SHA" GITHUB_REF="refs/heads/main" \
              "$REPORT" summary previous/coverage.out previous/coverage-summary.json
            cp previous/coverage-summary.json "$GITHUB_WORKSPACE/previous/coverage-summary.json"
          else
            echo "::warning::Previous commit produced no coverage output; reporting current only."
          fi
          if [[ -s previous/test-events.ndjson ]]; then
            GITHUB_SHA="$PREV_SHA" GITHUB_REF="refs/heads/main" \
              "$REPORT" timing previous/test-events.ndjson previous/timing-summary.json
            cp previous/timing-summary.json "$GITHUB_WORKSPACE/previous/timing-summary.json"
          else
            echo "::warning::Previous commit produced no test events; timing comparison will be baseline-only."
          fi

      - name: Compare coverage
        run: |
          set -euo pipefail
          PREV="previous/coverage-summary.json"
          [[ -s "$PREV" ]] || PREV="/nonexistent"
          ./.github/scripts/coverage/coverage-report.sh compare-coverage \
            current/coverage-summary.json \
            "$PREV" \
            comparison-report.json

      - name: Compare timing
        run: |
          set -euo pipefail
          PREV="previous/timing-summary.json"
          [[ -s "$PREV" ]] || PREV="/nonexistent"
          ./.github/scripts/coverage/coverage-report.sh compare-timing \
            current/timing-summary.json \
            "$PREV" \
            timing-comparison.json

      - name: Write step summary
        if: always()
        run: ./.github/scripts/coverage/coverage-report.sh render comparison-report.json timing-comparison.json

      - name: Upload coverage summary (current)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-summary-current.json
          path: current/coverage-summary.json
          retention-days: 90

      - name: Upload coverage summary (previous)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-summary-previous.json
          path: previous/coverage-summary.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload timing summary (current)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: timing-summary-current.json
          path: current/timing-summary.json
          retention-days: 90

      - name: Upload timing summary (previous)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: timing-summary-previous.json
          path: previous/timing-summary.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload comparison-report.json
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: comparison-report.json
          path: comparison-report.json
          retention-days: 90

      - name: Upload comparison-report.html
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: comparison-report.html
          path: comparison-report.html
          retention-days: 90

      - name: Upload timing-comparison.json
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: timing-comparison.json
          path: timing-comparison.json
          retention-days: 90

      - name: Notify Slack
        if: always() && hashFiles('comparison-report.json') != '' && hashFiles('timing-comparison.json') != '' && env.COVERAGE_SLACK_WEBHOOK_URL != ''
        env:
          COVERAGE_SLACK_WEBHOOK_URL: ${{ secrets.COVERAGE_SLACK_WEBHOOK_URL }}
          CURRENT_SHA: ${{ steps.refs.outputs.current_sha }}
          CURRENT_DATE: ${{ steps.refs.outputs.current_date }}
          PREVIOUS_SHA: ${{ steps.refs.outputs.previous_sha }}
          PREVIOUS_DATE: ${{ steps.refs.outputs.previous_date }}
          REPO: ${{ github.repository }}
        run: ./.github/scripts/coverage/coverage-report.sh notify comparison-report.json timing-comparison.json
