name: Docs Cleanup Version Gates

on:
  release:
    # Intentionally `released`, not `published`, so prereleases do not trigger
    # cleanup (mirrors announce-release.yml).
    types: [released]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Latest release tag to clean up against (e.g. v1.0.7)'
        required: true

jobs:
  cleanup:
    name: Remove obsolete docs version gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Use mise to install dependencies
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.5.12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove released Before/Since gates
        env:
          LATEST_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: mise x bun -- bun .github/scripts/docs-cleanup-version-gates.js

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          branch: docs/cleanup-version-gates
          commit-message: 'docs: clean up released version gates for ${{ github.event.release.tag_name || inputs.tag_name }}'
          title: 'docs: clean up released version gates for ${{ github.event.release.tag_name || inputs.tag_name }}'
          labels: automated
          body: |
            Now that `${{ github.event.release.tag_name || inputs.tag_name }}` has shipped, this removes the documentation
            version gates it made obsolete:

            - `<Before version="…">` blocks at or below the latest release are removed
              along with their contents (they can no longer render).
            - `<Since version="…">` blocks at or below the latest release are unwrapped,
              keeping their contents (now permanently displayed).

            Gates for versions above the latest release are left untouched. Generated by
            the `docs-cleanup-version-gates` workflow.

            > [!TIP]
            > Push an empty commit to this PR to trigger CI checks, which do not run
            > automatically on commits made by the `GITHUB_TOKEN`.
