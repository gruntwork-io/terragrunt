name: Duration Compare (Main)

on:
  workflow_call:

jobs:
  compare:
    name: Duration Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (scripts only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/scripts/duration
            .github/scripts/notify-slack.sh
          fetch-depth: 1

      - name: Download Current Duration Summary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: duration-summary.json
          path: current/

      - name: Download Previous Main Duration
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous

          BRANCH="${GITHUB_REF_NAME}"
          echo "Branch: $BRANCH"

          # Find last successful CI run on this branch (excluding current)
          PREV_RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=${BRANCH}&status=success&per_page=5" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})][0].id")

          if [[ -z "$PREV_RUN_ID" || "$PREV_RUN_ID" == "null" ]]; then
            echo "No previous successful run found on $BRANCH"
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Previous run: $PREV_RUN_ID"

          # Find the duration-summary.json artifact in that run
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${PREV_RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name == "duration-summary.json") | .id')

          if [[ -z "$ARTIFACT_ID" || "$ARTIFACT_ID" == "null" ]]; then
            echo "No duration artifact in previous run"
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Download and extract
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > /tmp/prev-duration.zip
          unzip -o /tmp/prev-duration.zip -d previous/
          echo "has_previous=true" >> "$GITHUB_OUTPUT"

      - name: Compare Durations
        run: |
          PREV_FILE="previous/duration-summary.json"
          if [[ "${{ steps.prev.outputs.has_previous }}" != "true" ]]; then
            PREV_FILE="nonexistent"
          fi
          ./.github/scripts/duration/compare-durations.sh current/duration-summary.json "$PREV_FILE" duration-comparison-report.json

      - name: Write Summary
        if: always()
        run: |
          if [[ -f duration-comparison-report.json ]]; then
            BASELINE=$(jq -r '.baseline' duration-comparison-report.json)
            if [[ "$BASELINE" == "true" ]]; then
              echo "## Duration Baseline Established" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Total: $(jq -r '.current_total' duration-comparison-report.json)s" >> "$GITHUB_STEP_SUMMARY"
            else
              CURR=$(jq -r '.current_total' duration-comparison-report.json)
              PREV=$(jq -r '.previous_total' duration-comparison-report.json)
              DELTA=$(jq -r '.total_delta' duration-comparison-report.json)
              echo "## :stopwatch: Duration Diff" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Current | ${CURR}s |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Previous | ${PREV}s |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Delta | ${DELTA}s |" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"

              SLOWS=$(jq -r '.top_slowdowns[:5][] | "| \(.package) | \(.previous)s | \(.current)s | +\(.delta)s | +\(.delta_pct)% |"' duration-comparison-report.json 2>/dev/null || true)
              if [[ -n "$SLOWS" ]]; then
                echo "### Top Slowdowns" >> "$GITHUB_STEP_SUMMARY"
                echo "| Package | Previous | Current | Delta | Delta % |" >> "$GITHUB_STEP_SUMMARY"
                echo "|---------|----------|---------|-------|---------|" >> "$GITHUB_STEP_SUMMARY"
                echo "$SLOWS" >> "$GITHUB_STEP_SUMMARY"
              fi

              FASTS=$(jq -r '.top_speedups[:5][] | "| \(.package) | \(.previous)s | \(.current)s | \(.delta)s | \(.delta_pct)% |"' duration-comparison-report.json 2>/dev/null || true)
              if [[ -n "$FASTS" ]]; then
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "### Top Speedups" >> "$GITHUB_STEP_SUMMARY"
                echo "| Package | Previous | Current | Delta | Delta % |" >> "$GITHUB_STEP_SUMMARY"
                echo "|---------|----------|---------|-------|---------|" >> "$GITHUB_STEP_SUMMARY"
                echo "$FASTS" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

      - name: Upload duration-comparison-report.json
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: duration-comparison-report.json
          path: duration-comparison-report.json
          retention-days: 30

      - name: Upload duration-comparison-report.html
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: duration-comparison-report.html
          path: duration-comparison-report.html
          retention-days: 30

      - name: Notify Slack
        if: always() && hashFiles('duration-comparison-report.json') != '' && github.ref == 'refs/heads/main'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DURATION_SLACK_WEBHOOK_URL }}
          TAG_NAME: ${{ github.ref_name }}@${{ github.sha }}
          REPO: ${{ github.repository }}
        run: ./.github/scripts/notify-slack.sh duration-comparison-report.json
