name: Gopls Quickfix Check

on:
  schedule:
    - cron: '0 2 1 * *'

  workflow_dispatch:

jobs:
  gopls-quickfix:
    name: Gopls Quickfix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Use mise to install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Go files
        id: gofiles
        # Written outside the working tree so it is never swept into the PR.
        env:
          GOFILES_LIST: ${{ runner.temp }}/gofiles.txt
        run: |
          find . -type f -name '*.go' -not -path './vendor/*' > "$GOFILES_LIST"

      - name: Run gopls quickfixes
        id: gopls_run
        env:
          GOFILES_LIST: ${{ runner.temp }}/gofiles.txt
        run: ./.github/scripts/gopls/run.sh

      - name: Create pull request for fixes
        if: steps.gopls_run.outputs.has_fixes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          branch: chore/gopls-quickfixes
          commit-message: 'chore: Apply gopls quickfixes'
          title: 'chore: Apply gopls quickfixes'
          labels: automated
          body: |
            Applies automatic quickfixes suggested by `gopls` for code quality improvements.

            > [!TIP]
            > Push an empty commit to this PR to trigger CI checks, which do not run
            > automatically on commits made by the `GITHUB_TOKEN`.

            Generated by the monthly gopls quickfix workflow.

      - name: Success message
        if: steps.gopls_run.outputs.has_fixes == 'false'
        run: |
          echo "✅ No gopls quickfix issues found!"
          echo "All Go files are up to date with gopls recommendations."
