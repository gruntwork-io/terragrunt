name: Test Release Scripts

on:
  pull_request:
    paths:
      - '.github/scripts/release/**'
      - '.github/workflows/test-release-scripts.yml'
      - 'mise.toml'
  push:
    branches: [main]
    paths:
      - '.github/scripts/release/**'
      - '.github/workflows/test-release-scripts.yml'
      - 'mise.toml'

jobs:
  test:
    name: Lint and test release scripts
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use mise to install dependencies
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: 2026.1.9
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: shellcheck
        run: |
          mise x shellcheck -- shellcheck \
            .github/scripts/release/check-release-exists.sh \
            .github/scripts/release/enforce-commit-sha.sh \
            .github/scripts/release/resolve-version-ref.sh \
            .github/scripts/release/validate-semver.sh \
            .github/scripts/release/tests/helpers/gh-stub.sh

      - name: shfmt
        run: |
          mise x shfmt -- shfmt -d \
            .github/scripts/release/check-release-exists.sh \
            .github/scripts/release/enforce-commit-sha.sh \
            .github/scripts/release/resolve-version-ref.sh \
            .github/scripts/release/validate-semver.sh \
            .github/scripts/release/tests/helpers/gh-stub.sh

      - name: bats
        run: mise x bats -- bats --print-output-on-failure .github/scripts/release/tests/
